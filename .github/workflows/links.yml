name: Links Assets And Status Sync

on:
  schedule:
    - cron: "30 8 * * 1"
  push:
    branches:
      - main
    paths:
      - "src/data/links/links.json"
      - "scripts/links/**"
      - ".github/workflows/links.yml"
  workflow_dispatch:

concurrency:
  group: links-assets-and-status-sync
  cancel-in-progress: true

jobs:
  links:
    if: ${{ github.actor != 'github-actions[bot]' }}
    name: Links assets and status sync
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.3
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sort links source
        run: pnpm run sort:links

      - name: Sync link assets
        run: pnpm run sync:links-assets

      - name: Sync link status
        run: pnpm run sync:links-status

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.CI_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.CI_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit changes
        id: commit
        run: |
          git config user.name "${{ secrets.CI_GIT_USER_NAME }}"
          git config user.email "${{ secrets.CI_GIT_USER_EMAIL }}"
          git add ./src/data/links ./public/assets/images/links
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -S -m "chore: update links data"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.commit.outputs.created == 'true'
        run: |
          git fetch origin "${GITHUB_REF_NAME}" --depth=1
          remote_sha="$(git rev-parse "origin/${GITHUB_REF_NAME}")"
          echo "Triggered on ${GITHUB_SHA}"
          echo "Remote ${GITHUB_REF_NAME} is ${remote_sha}"
          if [ "${remote_sha}" != "${GITHUB_SHA}" ]; then
            echo "Remote branch advanced before push; skipping stale run."
            exit 0
          fi
          git push origin "HEAD:${GITHUB_REF_NAME}"
